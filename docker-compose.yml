services:
  forma-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Live-mount data so body meshes and fabric library are editable without rebuild
      - ./data:/app/data
    environment:
      PYTHONPATH: /app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
